{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}?v=3">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-overlay">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">FlightDeck</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:home' %}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:about' %}">About</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:register' %}">Register</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:login' %}">Login</a></li>
            <li class="nav-item"><a class="nav-link active" href="{% url 'dashboard:adminlogin' %}">Admin</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Login Section -->
    <div class="login-section">

        <!-- Background Image -->
        <img src="{% static 'dashboard/image/hero.jpg' %}" 
             class="login-bg-img" 
             alt="Flight Background">

        <!-- Login Card -->
        <div class="login-card">
            <div class="text-center mb-4">
                <span style="font-size: 2.5rem;">✈️</span>
                <h3 class="login-title">Admin Login</h3>
                <p class="login-subtitle">FlightDeck Control Panel</p>
            </div>

            <div class="divider mb-4"></div>

            <form method="POST" action="{% url 'dashboard:adminlogin' %}">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label login-label">Username</label>
                    {{ form.username }}
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="form-label login-label">Password</label>
                    {{ form.password }}
                </div>

                <!-- Error Message -->
                {% if form.non_field_errors %}
                <div class="alert alert-danger text-center py-2 mb-3">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <!-- Login Button -->
                <div class="d-grid">
                    <button type="submit" class="btn login-btn">
                        🔐 Login
                    </button>
                </div>

            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
