{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}?v=5">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-overlay">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">FlightDeck</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:register' %}">Register</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{% url 'dashboard:login' %}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:adminlogin' %}">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="register-section">

        <img src="{% static 'dashboard/images/img.jpg' %}"
             class="register-bg-img"
             alt="Flight Background">

        <!-- Bootstrap Card -->
        <div class="card register-card" style="width: 450px;">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <span style="font-size: 2.5rem;">✈️</span>
                    <h3 class="login-title">Welcome Back!</h3>
                    <p class="login-subtitle">Login to your FlightDeck account</p>
                </div>

                <div class="divider mb-4"></div>

                <form method="POST" action="{% url 'dashboard:login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="login-label">🙍 Username</label>
                        <input type="text" name="username"
                               class="form-control login-input"
                               placeholder="Enter Username" required>
                    </div>

                    <div class="mb-4">
                        <label class="login-label">🔒 Password</label>
                        <input type="password" name="password"
                               class="form-control login-input"
                               placeholder="Enter Password" required>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger text-center py-2 mb-3">
                        {{ error }}
                    </div>
                    {% endif %}

                    <div class="d-grid">
                        <button type="submit" class="btn login-btn">
                            🔐 Login
                        <a href="{% url 'user:home' %}" style="color: #ffd700;">Go to Home</a>

                        </button>
                    </div>

                    <p class="text-center mt-3" style="color: #aaa; font-size: 0.9rem;">
                        Don't have an account?
                        <a href="{% url 'dashboard:register' %}" style="color: #ffd700;">Register here</a>
                    </p>

                </form>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
