{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlightDeck{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'user/css/user.css' %}">
</head>
<body>

    <!-- Navbar -->
    <nav class="user-navbar">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between" style="height: 65px;">

                <a class="user-brand" href="#">✈️ FlightDeck</a>

                <ul class="user-nav-links">
                    <li><a href="{% url 'user:home' %}" class="user-nav-link active">🏠 Home</a></li>
                    <li><a href="{% url 'user:search_flights' %}" class="user-nav-link">🔍 Search Flight</a></li>
                    <li><a href="{% url 'user:mybookings' %}" class="user-nav-link">📋 My Bookings</a></li>
                    <li><a href="{% url 'user:profile' %}" class="user-nav-link">👤 Profile</a></li>
                    <li><a href="{% url 'dashboard:logout' %}" class="user-nav-link logout">🚪 Logout</a></li>
                    <li><a href="{% url 'user:feedback' %}" class="user-nav-link">💬 Feedback</a></li>
                </ul>

            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
